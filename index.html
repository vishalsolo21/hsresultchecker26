<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" type="text/css" href="https://cdn.abplive.com/board-results-iframe-2020/css/register-board-results-form.css" />
  <style>
    .board-search-form-wrapper { min-height:140px}
    .roll_error { width: 100%; font-size:0.875rem; color: red; line-height: 1.5; text-align: center; margin-top: 10px;}
    .roll_error span { color: #ff0000;}
    .hr { margin: 0;}

    .rs-loader {position: fixed; left: 0; top: 0;  width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,1); color: #fff; display: flex; align-items: center; flex-direction: column; font-size: 16px; padding: 30px 0; overflow: auto;}

      .col-12.p-0.mb-3 { flex-wrap: wrap;}
      .w-50 { width: 100% !important; margin-left: 0!important;}
    }


  .rs-loader {position: fixed; left: 0; top: 0;  width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,1); color: #fff; display: flex; align-items: center; flex-direction: column; font-size: 16px; padding: 30px 0; overflow: auto;}
    .rs-loader p span {width: 1.25em; display: inline-block;}
    .rs-loader p span:after {overflow: hidden;display: inline-block;vertical-align: bottom;-webkit-animation: ellipsis steps(4,end) 900ms infinite; animation: ellipsis steps(4,end) 900ms infinite;content: "\2026"; width: 0px;}

    @keyframes ellipsis {

      }

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Nunito', sans-serif;
}

body {
  background: #f5f7fb;
  color: ;
  min-height: 100vh;
  padding: 16px;
}

form.board-reg-form,
.result-wrapper {
  max-width: 520px;
  margin: 20px auto;
  background: #ffffff;
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

h4.h4 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 10px;
  color: #111827;
}

label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #374151;
}

input,
select {
  width: 100%;
  padding: 14px;
  border: 1px solid #d1d5db;
  border-radius: 12px;
  outline: none;
  font-size: 15px;
  background: #fff;
  margin-bottom: 14px;
}

button,
.btn {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  background: #0f172a;
  color: #fff;
}

button:hover,
.btn:hover {
  opacity: 0.95;
}

.error {
  color: #dc2626;
  font-size: 14px;
  margin-top: 6px;
}

.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  overflow-x: auto;
}

.table th,
.table td {
  border: 1px solid #e5e7eb;
  padding: 10px;
}

.table th {
  background: #f9fafb;
  font-weight: 700;
}

#printResult {
  width: auto;
  padding: 8px 14px;
  margin-left: 10px;
  font-size: 13px;
  border-radius: 10px;
}

.footer {
  text-align: center;
  font-size: 14px;
  padding: 20px 10px;
  margin-top: 20px;
  background: transparent;
  color: #374151;
  border: none;
  box-shadow: none;
}

.footer .brand {
  color: #16a34a;
  font-weight: 700;
}

.rs-loader {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  z-index: 999;
  background: rgba(0,0,0,0.9);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 16px;
  padding: 30px 20px;
  text-align: center;
}

@media (max-width: 480px) {
  form.board-reg-form,
  .result-wrapper {
    padding: 18px;
    margin: 10px auto;
  }

  h4.h4 {
    font-size: 20px;
  }

  .table th,
  .table td {
    font-size: 13px;
    padding: 8px;
  }
}

</head>

<body>
  <form class="board-reg-form board-result-form mp-result-form" action="/" id="resultForm">
    <h4 class="h4 text-center">WBCHSE 12TH RESULTS</h4>
    <hr class="hr" />
    <div class="board-search-form-wrapper">
      <div class="board-search-form row">
        <div class="col-12 p-0 mb-3" style="display: flex;">
         
          <input class="w-50" type="text" placeholder="ROLL" maxlength="6" minlength="6" name="roll" autocomplete="off" required />
          
          <input class="w-50" type="text" placeholder="NO" maxlength="4" minlength="4" name="no" style=" margin-left: 10px;" autocomplete="off" required />

          <input class="w-50" type="text" placeholder="REGISTRATION NO" maxlength="10" minlength="10" name="registration" style=" margin-left: 10px;" autocomplete="off" required />

        </div>
        <button class="btn btn-primary d-inline-flex align-items-center" type="submit">
          CHECK RESULT
        </button>
      </div>
      <div class="roll_error" id="rollErr"></div>
      <div class="error" id="applErr"></div>
    </div>
  </form>
  <div class="rs-loader d-none" id="loadingSpinner" role="status" aria-hidden="true">
    <p>If you fail, never give up because FAIL means <br> 'First Attempt In Learning'<br> –A.P.J. Abdul Kalam<span></span></p>
      <!-- Micro_320 -->
      <ins class="adsbygoogle"
          style="display:inline-block;width:320px;height:480px"
          data-ad-client="ca-pub-7282862902545083"
          data-ad-slot="4617958085"></ins>

  </div>
  <div class="result-wrapper pb-3 d-none" id="resultWrapper">
    <div class="result-table" id="resultTable"></div>
    <button class="btn btn-primary d-block mx-auto" onclick="checkAnotherResult()">Check Another Result</button>
  </div>
  <script>
    var getUrlParam = (param) => {
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      return urlParams.get(param);
    };
    var postHeight = function () {
      let bodyHeight = document.body.scrollHeight+100;
      if (bodyHeight > 200) {
        window.parent.postMessage({
            iframeId: 'boardResultFormWB',
            type: 'resize-iframe',
            height: bodyHeight,
          },
          '*'
        );
      }
    };
    window.onload = function () {
      postHeight();
      const boardName = getUrlParam('board');
      const boardClass = getUrlParam('class');
      
    };
  </script>
  <script>
    var spinner = document.getElementById('loadingSpinner');
    function spinnerenable() {
      setTimeout(function () {
        spinner.classList.add('d-none');
        spinner.parentElement.classList.remove('disabled');
        spinner.parentElement.removeAttribute('disabled');
      }, 3000);
      
    }
    document.getElementById('resultForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      (adsbygoogle = window.adsbygoogle || []).push({});
      spinner.classList.remove('d-none');
      spinner.parentElement.classList.add('disabled');
      spinner.parentElement.setAttribute('disabled', 'disabled');
      const formData = new FormData(e.target);
      let data = Array.from(formData.entries()).reduce(
        (memo, pair) => ({
          ...memo,
          [pair[0]]: pair[1],
        }), {}
      );

      data.roll = data.roll.trim();
      data.no = data.no.trim();
      data.registration = data.registration.trim();
      var errors = [];
      var applErr = document.getElementById('applErr');
      applErr.innerHTML = '';
      rollErr.innerHTML = '';
      const roll = data.roll;
      const no = data.no;
      const registration = data.registration;
      if (roll == '') {
        errors.push = 'Roll is mandatory.';
      } else if (roll.length != 6) {
        errors.push("Roll should be 6 characters long.")
      } else if (isNaN(roll)) {
        errors.push("Roll should be numeric.");
      }
      else if (no == '') {
        errors.push = 'No is mandatory.';
      } else if (no.length != 4) {
        errors.push("No should be 4 characters long.")
      } else if (isNaN(no)) {
        errors.push("No should be numeric.")
      } else if (registration == '') {
        errors.push = 'Registration is mandatory.';
      } else if (isNaN(registration)) {
        errors.push("registration should be numeric.")
      }
      const rollNumber = roll+no;
      if (errors.length > 0) {
        spinnerenable()
        let errorHtml = "";
        errors.forEach(error => {
          errorHtml += `<p class="m-0">${error}</p>`;
        });
        applErr.innerHTML = errorHtml;
        return false;
      } else {
      
        url = `https://boardresultapi.abplive.com/wb/2025/12/${rollNumber}/${registration}`;

        fetch(url)
          .then(function (response) {return response.json();})
          .then(function (results) {
            let result = '';
            spinnerenable();
            console.log(results);
            if (results && typeof results.message!== 'undefined' && results.message.length > 0) {
              rollErr.innerHTML = "It seems you have entered an invalid Roll No. or Reg. No. You may contact W.B. Council of H.S. Education (Head Office), 9/2 Block DJ,Sector-II, Salt Lake. <br>Email : <span>hsexamquery21@wbchse.org.in</span>, <br>if you are in putting your correct Roll No. as printed on the Admit Card.";
              return;
            } else {
              document.getElementById('resultForm').classList.add('d-none');
              generateResultTable(results, data);
            }
          })
          .catch(function (err) {
            console.log(err);
            spinnerenable();
            rollErr.innerText = 'NOT PUBLISHED YET';
            setTimeout(function () {location.reload();}, 5000);
          });
      }
    });

    function checkAnotherResult() {
      const pagetype = getUrlParam("pagetype");
      if (pagetype == "amp") {
        document.getElementById('resultForm').reset();
        document.getElementById('resultForm').classList.remove('d-none');
        document.getElementById('resultWrapper').classList.add('d-none');
      } else { 
       location.reload();
        
      }
    }

    function generateResultTable(resultString, data) {
      let result = {};
      result['record_type']=resultString.record_type.trim();
      
      const rollNo = resultString.ROll_No.trim();
      result['roll'] = rollNo.substring(0, 6);
      result['number'] = rollNo.substring(6);
      result['institute_code'] = resultString.institute_code.trim();
      result['name'] = resultString.name.trim();
      result['totalMarks'] = resultString.totalMarks.trim();
      result['finalGrade'] = resultString.finalGrade.trim();
      result['totalPercent'] = resultString.totalPercent.trim();
      result['status'] = resultString.status.trim();
      result['sub'] = [];

      for(let i = 0; i < 6; i++){
        let j = i+1;
        result['sub'][i] = {'sub_code': '', 'thmarks' : '', 'prmarks': '', 'totalmarks': '', 'grade': '', 'percent' : ''};
        result['sub'][i].sub_code = resultString['sub_code'+j].trim();
        result['sub'][i].thmarks = resultString['thmarks'+j].trim();
        result['sub'][i].prmarks = resultString['prmarks'+j].trim();
        result['sub'][i].totalmarks = resultString['totalmarks'+j].trim();
        result['sub'][i].grade = resultString['grade'+j].trim();
        result['sub'][i].percent = resultString['percent'+j].trim();
      }
      result['regNo'] = resultString.Reg_No.trim();
      const boardName = 'WB Board';
      const boardClass = '12th';
      let personalHtml = '';
      let marksHtml = '';
      let finalHtml = '';
      
      
      personalHtml = `<tr><td width="50%">Candidate Name</td><td colspan="5">${result.name}</td></tr>
        <tr><td width="50%">Reg. Number</td><td colspan="5">${result.regNo}</td></tr>
        <tr><td width="50%">Roll Number</td><td colspan="5">${result['roll']} - ${result['number']}</td></tr>
        <tr><td width="50%">Institute Code</td><td colspan="5">${result['institute_code']}</td></tr>
        `;
      
      marksHtml = `<tr><th style="font-size:14px;font-weight:bold;">Subject</th><th style="font-size:14px;font-weight:bold;">Theory Marks with Grade</th><th style="font-size:14px;font-weight:bold;">Practical/Project Marks with Grade</th><th style="font-size:14px;font-weight:bold;">Total Marks</th><th style="font-size:14px;font-weight:bold;">Grade</th><th style="font-size:14px;font-weight:bold;">Prov. Percentile Marks</th></tr>`;
      result['sub'].forEach(subject => {
        if(subject.sub_code!=""){
          marksHtml += `
          <tr>
            <td width="20%">${subject.sub_code==""?"&nbsp;":subject.sub_code}</td>
            <td>${subject.thmarks==""?"&nbsp;":subject.thmarks}</td>
            <td>${subject.prmarks==""?"&nbsp;":subject.prmarks}</td>
            <td>${subject.totalmarks==""?"&nbsp;":subject.totalmarks}</td>
            <td>${subject.grade==""?"&nbsp;":subject.grade}</td>
            <td>${subject.percent==""?"&nbsp;":subject.percent}</td>
          </tr>`;
        }
      });

      finalHtml = `
      <tr><td width="50%">Grand Total</td><td>${result.totalMarks}</td></tr>
      <tr><td width="50%">Overall Grade</td><td>${result.finalGrade}</td></tr>
      <tr><td width="50%">Overall Provisional Percentile</td><td>${result.totalPercent}</td></tr>
      <tr><td width="50%">Status</td><td>${result.status}</td></tr>`;

      const personalTable = `<table class="table" width="100%" border="1" id="marksheet"><thead><tr><th colspan="6" style="text-align:center;"><span class="result-title" style="font-size:16px;">PERSONAL DETAILS</span></th></tr></thead><tbody>${personalHtml}</tbody></table>`;

      const marksTable = `<table class="table" width="100%" border="1" id="marksheet"><thead><tr><th colspan="6" style="text-align:center;"><span class="result-title" style="font-size:16px;">MARKS DETAILS</span></th></tr></thead><tbody>${marksHtml}</tbody></table>`;
      
      const finalTable = `<table class="table" width="100%" border="1" id="marksheet"><thead><tr><th colspan="6" style="text-align:center;"><span class="result-title" style="font-size:16px;">FINAL RESULT</span></th></tr></thead><tbody>${finalHtml}</tbody></table>`;

      const resultTableHtml =
        `<table class="table" width="100%" border="1" id="marksheet"><thead><tr><th colspan="6"><span class="result-title" style="font-size:16px;">${boardName} ${boardClass} Result</span><button class="" id="printResult" onclick="window.print();">Print</button></th></tr></thead>
        <tbody><tr><td>${personalTable}</td></tr><tr><td>${marksTable}</td></tr><tr><td>${finalTable}</td></tr></tbody>
        <tfoot><!--<tr><td>Note : Regulation 9(1)/9(2b) applied as per rule.</td></tr> --><tr><td><small class="disclaimer"><strong>Disclaimer: </strong>“Provisional results of Higher Secondary, 2025 have been published by WBCHSE with a view to providing immediate information to the examinees. These cannot be treated as original mark sheets. West Bengal Council of Higher Secondary Education is not responsible for any inadvertent error that might have crept in the results of Higher Secondary, 2025 being published through this Website.”</small></td></tr></tfoot></table>
          `;
      document.getElementById('resultWrapper').classList.remove('d-none');
      document.getElementById('resultTable').innerHTML = resultTableHtml;
      postHeight();
    }
  </script>
  <div class="footer">
      Made with ❤️ by Vishal | <span class="brand">RAIGANJLOOTERS</span>
  </div>
</body>

</html>
