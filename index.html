* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Nunito', sans-serif;
}

body {
  background: #f5f7fb;
  color: ;

  padding: 16px;
}

form.board-reg-form,
.result-wrapper {
  max-width: 520px;

}

h4.h4 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;

label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #374151;
}

input,
select {
  width: 100%;
  padding: 14px;

button,

<body>
  <form class="board-reg-form board-result-form mp-result-form" action="/" id="resultForm">
    <h4 class="h4 text-center">WBCHSE 12TH RESULTS</h4>
    <hr class="hr" />
    <div class="board-search-form-wrapper">
      <div class="board-search-form row">
        <div class="col-12 p-0 mb-3" style="display: flex;">
         
          <input class="w-50" type="text" placeholder="ROLL (6 digits)" maxlength="6" minlength="6" name="roll" autocomplete="off" required />
          
          <input class="w-50" type="text" placeholder="NO (4 digits)" maxlength="4" minlength="4" name="no" style=" margin-left: 10px;" autocomplete="off" required />

          <input class="w-50" type="text" placeholder="REGISTRATION NO (10 digits)" maxlength="10" minlength="10" name="registration" style=" margin-left: 10px;" autocomplete="off" required />

        </div>
        <button class="btn btn-primary d-inline-flex align-items-center" type="submit">
          CHECK RESULT
        </button>
      </div>
      <div class="roll_error" id="rollErr"></div>
      <div class="error" id="applErr"></div>
    </div>
  </form>
  <div class="rs-loader d-none" id="loadingSpinner" role="status" aria-hidden="true">
    <p>If you fail, never give up because FAIL means <br> 'First Attempt In Learning'<br> –A.P.J. Abdul Kalam<span></span></p>
      <!-- Micro_320 -->
      <ins class="adsbygoogle"
          style="display:inline-block;width:320px;height:480px"
          data-ad-client="ca-pub-7282862902545083"
          data-ad-slot="4617958085"></ins>

  </div>
    <div class="result-wrapper pb-3 d-none" id="resultWrapper">
    <div class="result-table" id="resultTable"></div>
    <button class="btn btn-primary d-block mx-auto" onclick="checkAnotherResult()">Check Another Result</button>
  </div>
  <script>
    var getUrlParam = (param) => {
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      return urlParams.get(param);
    };
    var postHeight = function () {
      let bodyHeight = document.body.scrollHeight+100;
      if (bodyHeight > 200) {
        window.parent.postMessage({
            iframeId: 'boardResultFormWB',
            type: 'resize-iframe',
            height: bodyHeight,
          },
          '*'
        );
      }
    };
    window.onload = function () {
      postHeight();
      const boardName = getUrlParam('board');
      const boardClass = getUrlParam('class');
      // document.getElementById('boardName').innerText = boardName;
      // document.getElementById('boardClass').innerText = boardClass;
    };
  </script>
  <script>
    var spinner = document.getElementById('loadingSpinner');
    function spinnerenable() {
      setTimeout(function () {
        spinner.classList.add('d-none');
        spinner.parentElement.classList.remove('disabled');
        spinner.parentElement.removeAttribute('disabled');
      }, 3000);
      //}, 0);
    }
    document.getElementById('resultForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      (adsbygoogle = window.adsbygoogle || []).push({});
      spinner.classList.remove('d-none');
      spinner.parentElement.classList.add('disabled');
      spinner.parentElement.setAttribute('disabled', 'disabled');
      const formData = new FormData(e.target);
      let data = Array.from(formData.entries()).reduce(
        (memo, pair) => ({
          ...memo,
          [pair[0]]: pair[1],
        }), {}
      );

      data.roll = data.roll;
      data.no = data.no;
      data.registration = data.registration;
      var errors = [];
      var applErr = document.getElementById('applErr');
      applErr.innerHTML = '';
      rollErr.innerHTML = '';
      const roll = data.roll;
      const no = data.no;
      const registration = data.registration;
      if (roll == '') {
        errors.push = 'Roll is mandatory.';
      } else if (roll.length != 6) {
        errors.push("Roll should be 6 characters long.")
      } else if (isNaN(roll)) {
        errors.push("Roll should be numeric.");
      }
      else if (no == '') {
        errors.push = 'No is mandatory.';
      } else if (no.length != 4) {
        errors.push("No should be 4 characters long.")
      } else if (isNaN(no)) {
        errors.push("No should be numeric.")
      } else if (registration == '') {
        errors.push = 'Registration is mandatory.';
      } else if (isNaN(registration)) {
        errors.push("registration should be numeric.")
      }
      const rollNumber = roll+no;
      if (errors.length > 0) {
        spinnerenable()
        let errorHtml = "";
        errors.forEach(error => {
          errorHtml += `<p class="m-0">${error}</p>`;
        });
        applErr.innerHTML = errorHtml;
        return false;
      } else {
        //url = `https://bengali.abplive.com/wb12prod/getresult12/TBAS566709/${reg_n}`;
        url = `https://boardresultapi.abplive.com/wb/2026/12/${rollNumber}`;

        fetch(url)
          .then(function (response) {return response.json();})
          .then(function (results) {
            let result = '';
            spinnerenable();
            
            if (results && typeof results.message!== 'undefined' && results.message.length > 0) {
              rollErr.innerHTML = "It seems you have entered an invalid Roll No. or Reg. No. You may contact W.B. Council of H.S. Education (Head Office), 9/2 Block DJ,Sector-II, Salt Lake. <br>Email : <span>hsexamquery21@wbchse.org.in</span>, <br>if you are in putting your correct Roll No. as printed on the Admit Card.";
              return;
            } else {
              document.getElementById('resultForm').classList.add('d-none');
            //   generateResultTable(results, data);
               const type_format = results.display_format || 'old';
              
               if (type_format == 'new') {
                  generateResultTableNew(results, results);
               } else {
                    const normalized = normalizeResultData(results);
                    generateResultTable(normalized, data);
               }
            
            }
          })
          .catch(function (err) {
            console.log(err);
            spinnerenable();
            rollErr.innerText = 'Error! Please Retry.';
            setTimeout(function () {location.reload();}, 5000);
          });
      }
    });

    function checkAnotherResult() {
      const pagetype = getUrlParam("pagetype");
      if (pagetype == "amp") {
        document.getElementById('resultForm').reset();
        document.getElementById('resultForm').classList.remove('d-none');
        document.getElementById('resultWrapper').classList.add('d-none');
      } else { 
       location.reload();
        // window.parent.postMessage({
        //     type: 'reload-page',
        //   },
        //   '*'
        // );
        // postHeight();
      }
    }


   function normalizeResultData(data) {

    return {

        marksheet_no: data.MARKSHEET_NO || '',
        roll_no: data.ROLL || '',
        institute_code: data.INSTITUTION_CODE || '',
        name: data.STUDENT_NAME || '',
        reg_no: data.REGISTRATION_NO || '',
        totalMarks: data.TOTAL_MARKS || '',
        totalPercent: data.TOTAL_PERCENTILE || '',
        finalGrade: data.OVERALL_GRADE || '',
        status: data.RESULT || '',
        exam_year: data.EXAM_YEAR || '',

        subjects: [

            {
                type: 'Language-A',
                code: data.LANG1_CODE || '',
                theory: data.LANG1_THEO_MARKS || '',
                practical: data.LANG1_PRAC_MARKS || '',
                total: data.LANG1_TOTAL_MARKS || '',
                percent: data.LANG1_PERCENTILE || '',
                grade: ''
            },

            {
                type: 'Language-B',
                code: data.LANG2_CODE || '',
                theory: data.LANG2_THEO_MARKS || '',
                practical: data.LANG2_PRAC_MARKS || '',
                total: data.LANG2_TOTAL_MARKS || '',
                percent: data.LANG2_PERCENTILE || '',
                grade: ''
            },

            {
                type: 'Elective-1',
                code: data.ELEC1_CODE || '',
                theory: data.ELEC1_THEO_MARKS || '',
                practical: data.ELEC1_PRAC_MARKS || '',
                total: data.ELEC1_TOTAL_MARKS || '',
                percent: data.ELEC1_PERCENTILE || '',
                grade: ''
            },

            {
                type: 'Elective-2',
                code: data.ELEC2_CODE || '',
                theory: data.ELEC2_THEO_MARKS || '',
                practical: data.ELEC2_PRAC_MARKS || '',
                total: data.ELEC2_TOTAL_MARKS || '',
                percent: data.ELEC2_PERCENTILE || '',
                grade: ''
            },

            {
                type: 'Elective-3',
                code: data.ELEC3_CODE || '',
                theory: data.ELEC3_THEO_MARKS || '',
                practical: data.ELEC3_PRAC_MARKS || '',
                total: data.ELEC3_TOTAL_MARKS || '',
                percent: data.ELEC3_PERCENTILE || '',
                grade: ''
            },

            {
                type: 'Optional',
                code: data.OPTIONAL_CODE || '',
                theory: data.OPTIONAL_THEO_MARKS || '',
                practical: data.OPTIONAL_PRAC_MARKS || '',
                total: data.OPTIONAL_TOTAL_MARKS || '',
                percent: data.OPTIONAL_PERCENTILE || '',
                grade: ''
            }

        ]

    };

}

    function generateResultTable(result) {

      let subjectRows = '';

      result.subjects.forEach(subject => {

        if (subject.code != '') {

          subjectRows += `
          
          <tr>

            <td>${subject.type}</td>
            <td>${subject.code}</td>
            <td>${subject.theory}</td>
            <td>${subject.practical}</td>
            <td>${subject.total}</td>
            <td>${subject.percent}</td>
            <td>${subject.grade}</td>

          </tr>
          
          `;

        }

      });

      const resultTableHtml = `

      <table class="table" width="100%" border="1">

        <thead>

          <tr>

            <th colspan="7">

              <span class="result-title" style="font-size:16px;">
                WB Board 12th Result
              </span>

              <button onclick="window.print();" style="float:right;">
                Print
              </button>

            </th>

          </tr>

        </thead>

        <tbody>

          <tr>
            <td colspan="7">

              <table class="table" width="100%" border="1">

                <tr>
                  <td width="50%">Candidate Name</td>
                  <td>${result.name}</td>
                </tr>

                <tr>
                  <td>Registration No</td>
                  <td>${result.reg_no}</td>
                </tr>

                <tr>
                  <td>Roll Number</td>
                  <td>${result.roll_no}</td>
                </tr>

                <tr>
                  <td>Institute Code</td>
                  <td>${result.institute_code}</td>
                </tr>

                <tr>
                  <td>Marksheet No</td>
                  <td>${result.marksheet_no}</td>
                </tr>

              </table>

            </td>
          </tr>

          <tr>

            <td colspan="7">

              <table class="table" width="100%" border="1">

                <thead>

                  <tr>

                    <th>Type</th>
                    <th>Subject Code</th>
                    <th>Theory</th>
                    <th>Practical</th>
                    <th>Total Marks</th>
                    <th>Provisional Percentile</th>
                    <th>Grade</th>

                  </tr>

                </thead>

                <tbody>

                  ${subjectRows}

                </tbody>

              </table>

            </td>

          </tr>

          <tr>

            <td colspan="7">

              <table class="table" width="100%" border="1">

                <tr>
                  <td width="50%">Marks Obtained</td>
                  <td>${result.totalMarks}</td>
                </tr>

                <tr>
                  <td>Overall Percentile</td>
                  <td>${result.totalPercent}</td>
                </tr>

                <tr>
                  <td>Final Grade</td>
                  <td>${result.finalGrade}</td>
                </tr>

                <tr>
                  <td>Result Status</td>
                  <td>${result.status}</td>
                </tr>

              </table>

            </td>

          </tr>

        </tbody>

        <tfoot>

          <tr>

            <td colspan="7">

              <small class="disclaimer">

                <strong>Disclaimer:</strong>

                This is a provisional marksheet generated for immediate information only.

              </small>

            </td>

          </tr>

        </tfoot>

      </table>

      `;

      document.getElementById('resultWrapper').classList.remove('d-none');

      document.getElementById('resultTable').innerHTML = resultTableHtml;

    }


/* ================= HELPER ================= */
function val(v){ return v && v !== "" ? v : "&nbsp;"; }

function buildRow(d, key){
  return `
  <tr>
    <td>${val(d[`${key}_CODE`])}</td>

    <td>${val(d[`${key}_SEM3_FULL_MARKS`])}</td>
    <td>${val(d[`${key}_SEM3_PASS_MARKS`])}</td>
    <td>${val(d[`${key}_SEM3_OBTNMARKS`])}</td>

    <td>${val(d[`${key}_THEO_FULL_MARKS`])}</td>
    <td>${val(d[`${key}_THEO_PASS_MARKS`])}</td>
    <td>${val(d[`${key}_THEO_OBTNMARKS`])}</td>

    <td>${val(d[`${key}_PRAC_FULL_MARKS`])}</td>
    <td>${val(d[`${key}_PRAC_PASS_MARKS`])}</td>
    <td>${val(d[`${key}_PRAC_OBTNMARKS`])}</td>

    <td>100</td>
    <td>${val(d[`${key}_TOTAL_MARKS`])}</td>

    <td>${val(d[`${key}_OVERALL_GRD`])}</td>
    <td>${val(d[`${key}_PERCENTILE`])}</td>
  </tr>
  `;
}


/* ================= NEW UI ================= */
function generateResultTableNew(data){

  const html = `
  <div class="marksheet-new">
 <button onclick="window.print();" style="float:right; background-color: #007bff; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                Print
              </button>
    <h3 style="text-align:center;">MARK SHEET OF HIGHER SECONDARY EXAMINATION, 2026</h3>
    <p style="text-align:center;">Marks, Grade and Provisional Percentile obtained by the Candidate</p>

    <table width="100%" border="1" cellpadding="5">

      <tr><td width="30%">Name</td><td>${val(data.CANDIDATE_NAME)}</td></tr>
      <tr><td>Father/Mother</td><td>${val(data.CANDIDATE_GUARDIAN_NAME)}</td></tr>
      <tr><td>Registration No.</td><td>${val(data.REGISTRATION_NO)}</td></tr>
      <tr><td>Date of Birth</td><td>${val(data.DATE_OF_BIRTH)}</td></tr>
      <tr><td>Institution</td><td>${val(data.INSTI_NAME_CD)}</td></tr>

    </table>

    <br/>

    <table width="100%" border="1" cellpadding="5">

      <tr>
        <th rowspan="2">Subject Code</th>
        <th colspan="3">Semester-III</th>
        <th colspan="3">Semester-IV</th>
        <th colspan="3">Practical</th>
        <th colspan="2">Total</th>
        <th rowspan="2">Grade</th>
        <th rowspan="2">Provisional Percentile</th>
      </tr>

      <tr>
        <th>Full Marks</th><th>Pass Marks</th><th>Obtained Marks</th>
        <th>Full Marks</th><th>Pass Marks</th><th>Obtained Marks</th>
        <th>Full Marks</th><th>Pass Marks</th><th>Obtained Marks</th>
        <th>Full Marks</th><th>Obtained Marks</th>
      </tr>

      <tr><td colspan="14"><b>Compulsory Language Subjects</b></td></tr>

        <td colspan="14"><b>Result: ${val(data.RESULT)}</b></td>
      </tr>

    </table>
     <small class="disclaimer">

        <strong>Disclaimer:</strong>

        This is a provisional marksheet generated for immediate information only.

  document.getElementById('resultWrapper').classList.remove('d-none');
  document.getElementById('resultTable').innerHTML = html;
}


  </script>
